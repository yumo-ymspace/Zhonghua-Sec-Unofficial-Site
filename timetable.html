<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access official class timetables for Zhonghua Secondary School. Select your level and class to download the current semester schedule.">
    <title>Zhonghua Secondary | Timetables</title>
    <link rel="canonical" href="https://zhonghuasec.school/timetable.html">
    <meta property="og:title" content="Class Timetables | Zhonghua Secondary School">
    <meta property="og:description" content="Access your official semester class timetable. Select your level and class to get the direct PDF link.">
    <meta property="og:url" content="https://zhonghuasec.school/timetable.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Zhonghua Secondary School">
    <link rel="icon" href="https://www.zhonghuasec.moe.edu.sg/images/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <div id="header-placeholder"></div>
    <script src="header.js"></script>

    <main id="main-content" class="flex-grow py-12 md:py-16 page-enter relative">
        <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-[0.02] pointer-events-none"></div>
        
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="text-center mb-8 md:mb-12">
                <span class="text-emerald-600 font-bold uppercase tracking-wide text-xs md:text-sm">Student Services</span>
                <h2 class="text-3xl md:text-4xl font-extrabold mt-2 gradient-text">Class Timetables (2026)</h2>
                <p class="mt-4 text-sm md:text-base text-slate-600 max-w-2xl mx-auto">Access your official semester schedule. Select your stream and class below to generate your direct access link.</p>
            </div>

            <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-200/60 overflow-hidden backdrop-blur-sm transition-all duration-300 hover:shadow-2xl hover:shadow-slate-200">
                <div class="p-6 md:p-8 border-b border-emerald-100 bg-gradient-to-r from-emerald-50/50 to-emerald-100/50">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="group">
                            <label class="block text-sm font-semibold text-emerald-800 mb-2 group-hover:text-emerald-600 transition-colors">Level</label>
                            <select id="levelSelect" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white text-sm shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <option value="sec1">Secondary 1</option>
                                <option value="sec2">Secondary 2</option>
                                <option value="sec3">Secondary 3</option>
                                <option value="sec4">Secondary 4</option>
                                <option value="sec5">Secondary 5</option>
                            </select>
                        </div>
                        <div class="group">
                            <label class="block text-sm font-semibold text-emerald-800 mb-2 group-hover:text-emerald-600 transition-colors">Class</label>
                            <select id="classSelect" class="w-full p-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none bg-white text-sm shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                            </select>
                        </div>
                    </div>
                </div>
                <div class="p-8 md:p-10 text-center">
                    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-2" id="selectedClassDisplay">Class 1C1</h3>
                    <p class="text-sm md:text-base text-slate-500 mb-8" id="semesterLabel">Official PDF Document • Semester 1, 2026</p>
                    
                    <div class="flex flex-col sm:flex-row justify-center gap-4">
                        <a href="https://www.zhonghuasec.moe.edu.sg/infolinks/class-timetable/" target="_blank" class="px-6 py-3 bg-emerald-600 text-white font-medium rounded-lg hover:bg-emerald-700 transition shadow-md flex items-center justify-center gap-2 text-sm md:text-base">
                            <span>📂</span> View Official Repository
                        </a>
                        <a id="directLink" href="#" target="_blank" class="px-6 py-3 bg-white border border-emerald-200 text-emerald-700 font-medium rounded-lg hover:bg-emerald-50 transition flex items-center justify-center gap-2 text-sm md:text-base">
                            <span>📄</span> Direct PDF Download
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="footer.js"></script>

    <script>
        const currentTerm = 2;
        const currentSemester = 1;
        const currentYear = 2026;

        const classes = {
            "sec1": ["1C1", "1C2", "1C3", "1C4", "1C5", "1C6", "1C7", "1C8"],
            "sec2": ["2I1", "2I2", "2I3", "2I4", "2I5", "2I6", "2I7", "2I8"],
            "sec3": ["3R1", "3R2", "3R3", "3R4", "3R5", "3R6", "3R7", "3R8"],
            "sec4": ["4E1", "4E2", "4E3", "4E4", "4E5", "4E6", "4E7", "4E8"],
            "sec5": ["5E1"]
        };

        const lvlSelect = document.getElementById('levelSelect');
        const clsSelect = document.getElementById('classSelect');
        const display = document.getElementById('selectedClassDisplay');
        const link = document.getElementById('directLink');
        const semLabel = document.getElementById('semesterLabel');

        semLabel.textContent = `Official PDF Document • Semester ${currentSemester}, ${currentYear}`;

        function populate() {
            const list = classes[lvlSelect.value];
            clsSelect.innerHTML = '';
            list.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                clsSelect.appendChild(opt);
            });
            update();
        }
        function update() {
            const cls = clsSelect.value;
            display.textContent = `Class ${cls}`;
            link.href = `https://www.zhonghuasec.moe.edu.sg/files/${cls}_Term_${currentTerm}.pdf`;
        }
        lvlSelect.addEventListener('change', populate);
        clsSelect.addEventListener('change', update);
        populate();
    </script>
    <noscript>
        <div style="padding:2rem 1rem;text-align:center;background:#fef3c7;color:#92400e;font-size:0.875rem">
            JavaScript is required for this site to display navigation. Please visit
            <a href="https://www.zhonghuasec.moe.edu.sg/" style="color:#047857;font-weight:700">the official school website</a>.
        </div>
    </noscript>
</body>
</html>
